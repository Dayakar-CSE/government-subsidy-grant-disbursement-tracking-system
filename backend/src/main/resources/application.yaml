spring:
  application:
    name: government-subsidy-tracking-system

  datasource:
    url: jdbc:mysql://localhost:3306/government_subsidy_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

server:
  port: 8080